<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semanario China</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="article">
  <header class="site-header article-header">
    <div class="top-strip"></div>

    <div class="container">
      <div class="header-row">
        <div>
          <div class="site-kicker" id="site-kicker">Noticias sobre China para América Latina</div>
          <h1 class="site-title small-title">
            <a href="index.html">Semanario China</a>
          </h1>
        </div>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="zh">中文</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container article-page">
    <a class="back-link" id="back-link" href="index.html">← Volver a la portada</a>

    <article class="article-box">
      <div class="article-category" id="article-category"></div>
      <h1 class="article-title" id="article-title"></h1>
      <div class="article-meta" id="article-meta"></div>
      <img class="article-image" id="article-image" src="" alt="" />
      <div class="article-body" id="article-body"></div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <div>© 2026 Semanario China</div>
      <div id="footer-text">Cobertura de China y América Latina</div>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
