<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semanario China</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="home">
  <header class="site-header">
    <div class="top-strip"></div>

    <div class="container">
      <div class="header-row">
        <div>
          <div class="site-kicker" id="site-kicker">Noticias sobre China para América Latina</div>
          <h1 class="site-title">Semanario China</h1>
          <p class="site-subtitle" id="site-subtitle">Ventana bilingüe y trilingüe sobre China, América Latina y el mundo.</p>
        </div>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="zh">中文</button>
        </div>
      </div>

      <nav class="main-nav" id="main-nav"></nav>
    </div>
  </header>

  <main class="container main-home">
    <section class="hero-layout">
      <article class="hero-card" id="hero-card"></article>
      <aside class="sidebar-panel" id="latest-panel"></aside>
    </section>

    <section class="section-block">
      <div class="section-header">
        <h2 id="featured-title"></h2>
      </div>
      <div class="card-grid" id="featured-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <div>© 2026 Semanario China</div>
      <div id="footer-text">Cobertura de China y América Latina</div>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
