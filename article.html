<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semanario China</title>
  <meta name="description" content="Semanario China article page" />

  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #666;
      --line: #e7e3db;
      --brand: #8b1e2d;
      --brand-dark: #6f1422;
      --max-width: 920px;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
        Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 247, 245, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .site-header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--brand);
    }

    .site-nav {
      display: flex;
      gap: 16px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .page-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .article-shell {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .article-head {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 26px;
    }

    .article-cover {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #eee;
    }

    .article-head-inner {
      padding: 30px 28px 24px;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .article-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(139, 30, 45, 0.08);
      color: var(--brand);
      font-weight: 600;
      font-size: 0.88rem;
    }

    .article-title {
      margin: 0 0 14px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .article-summary {
      margin: 0;
      font-size: 1.03rem;
      color: #444;
      line-height: 1.9;
    }

    .article-body {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 34px 28px;
    }

    .article-body p {
      margin: 0 0 1.2em;
      font-size: 1.06rem;
    }

    .article-body h2,
    .article-body h3 {
      margin-top: 1.8em;
      margin-bottom: 0.8em;
      line-height: 1.35;
    }

    .article-body img {
      max-width: 100%;
      border-radius: 14px;
      display: block;
      margin: 20px auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .loading,
    .error {
      max-width: var(--max-width);
      margin: 80px auto;
      padding: 28px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    @media (max-width: 640px) {
      .article-head-inner,
      .article-body {
        padding: 22px 18px;
      }

      .article-body p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body data-page="article">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="./index.html">Semanario China</a>
      <nav class="site-nav">
        <a href="./index.html?lang=es">ES</a>
        <a href="./index.html?lang=en">EN</a>
        <a href="./index.html?lang=zh">中文</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <div id="app" class="article-shell">
      <div class="loading">Loading...</div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
